<!doctype html>
<html lang="en" data-evu-palette="indigo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EvuKB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        try {
          const root = document.documentElement;
          const scheme =
            localStorage.getItem('evu-color-scheme') ||
            localStorage.getItem('evukb-color-scheme') ||
            'system';
          const dark =
            scheme === 'dark' ||
            (scheme !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';
          const palette = localStorage.getItem('evu-palette');
          root.setAttribute(
            'data-evu-palette',
            palette === 'blue' || palette === 'indigo' ? palette : 'indigo',
          );
        } catch {
          /* ignore storage / matchMedia failures during FOUC */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
