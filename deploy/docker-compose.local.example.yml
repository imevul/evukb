# Copy this file to deploy/docker-compose.local.yml and include it with:
# docker compose --project-directory . -f deploy/docker-compose.dev.yml -f deploy/docker-compose.local.yml up
#
# The copied local override is gitignored.

services:
  evukb-api:
    environment:
      TZ: ${TZ:-UTC}
      EVUKB_API_PORT: 4201
      EVUKB_BLOB_ROOT: /data/corpus-store
      EVUKB_EMBEDDING_PROVIDER: openai-compatible
      EVUKB_EMBEDDING_MODEL: text-embedding-3-small
      EVUKB_LLM_PROVIDER: openai-compatible
      EVUKB_LLM_MODEL: gpt-4o-mini
      EVUKB_LOG_LEVEL: debug
    ports:
      - "4201:4201"
    volumes:
      - .evukb/corpus-store:/data/corpus-store

  evukb-web:
    environment:
      TZ: ${TZ:-UTC}
      VITE_EVUKB_API_BASE_URL: http://localhost:4201
    ports:
      - "4200:4200"

  postgres:
    ports:
      - "5432:5432"

  qdrant:
    ports:
      - "6333:6333"

  ollama:
    ports:
      - "11434:11434"

# Optional local embeddings (requires --profile local-embed):
# evukb-api:
#   environment:
#     EVUKB_EMBEDDING_API_KEY: local
#     EVUKB_EMBEDDING_BASE_URL: http://ollama:11434/v1
#     EVUKB_EMBEDDING_MODEL: <your-model>
#     EVUKB_EMBEDDING_BATCH_SIZE: 1
