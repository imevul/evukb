services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${EVUKB_POSTGRES_DB:-evukb}
      POSTGRES_PASSWORD: ${EVUKB_POSTGRES_PASSWORD:-evukb}
      POSTGRES_USER: ${EVUKB_POSTGRES_USER:-evukb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  evukb-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      EVUKB_API_PORT: ${EVUKB_API_PORT:-4201}
      EVUKB_REGISTER_EXAMPLE_RANKING_STRATEGIES: "false"
      # In-container paths and service DNS; do not inherit host .env localhost URLs.
      EVUKB_BLOB_ROOT: /data/corpus-store
      EVUKB_DATABASE_URL: postgres://evukb:evukb@postgres:5432/evukb
      EVUKB_HOST: ${EVUKB_HOST:-0.0.0.0}
      EVUKB_LOG_LEVEL: ${EVUKB_LOG_LEVEL:-info}
      EVUKB_QDRANT_URL: ${EVUKB_QDRANT_URL:-http://qdrant:6333}
      # Required when auth is enforced (production default); startup fails if empty.
      EVUKB_TOKEN_PEPPER: ${EVUKB_TOKEN_PEPPER:-}
      EVUKB_VECTOR_BACKEND: ${EVUKB_VECTOR_BACKEND:-pgvector}
      EVUKB_WEB_ORIGIN: ${EVUKB_WEB_ORIGIN:-http://localhost:4200}
      EVUKB_BOOTSTRAP_WORKSPACE_SLUG: ${EVUKB_BOOTSTRAP_WORKSPACE_SLUG:-local-dev}
      EVUKB_BOOTSTRAP_WORKSPACE_NAME: ${EVUKB_BOOTSTRAP_WORKSPACE_NAME:-EvuKB}
      EVUKB_OPERATOR_API_KEY: ${EVUKB_OPERATOR_API_KEY:-}
      EVUKB_SECRETS_KEY: ${EVUKB_SECRETS_KEY:-}
      EVUKB_MAX_UPLOAD_BYTES: ${EVUKB_MAX_UPLOAD_BYTES:-104857600}
      EVUKB_MAX_ARCHIVE_IMPORT_BYTES: ${EVUKB_MAX_ARCHIVE_IMPORT_BYTES:-524288000}
      EVUKB_MOUNT_ALLOWLIST: ${EVUKB_MOUNT_ALLOWLIST:-}
      EVUKB_ENABLE_MOUNT_AUTHORITATIVE: ${EVUKB_ENABLE_MOUNT_AUTHORITATIVE:-false}
      EVUKB_ENABLE_IMPORT_WRITEBACK: ${EVUKB_ENABLE_IMPORT_WRITEBACK:-false}
      EVUKB_EMBEDDING_PROVIDER: ${EVUKB_EMBEDDING_PROVIDER:-openai-compatible}
      EVUKB_EMBEDDING_API_KEY: ${EVUKB_EMBEDDING_API_KEY:-}
      EVUKB_EMBEDDING_BASE_URL: ${EVUKB_EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      EVUKB_EMBEDDING_MODEL: ${EVUKB_EMBEDDING_MODEL:-text-embedding-3-small}
      EVUKB_EMBEDDING_DIMENSIONS: ${EVUKB_EMBEDDING_DIMENSIONS:-1536}
      EVUKB_EMBEDDING_BATCH_SIZE: ${EVUKB_EMBEDDING_BATCH_SIZE:-8}
      EVUKB_EMBEDDING_MAX_RETRIES: ${EVUKB_EMBEDDING_MAX_RETRIES:-3}
      EVUKB_CHUNKING_STRATEGY: ${EVUKB_CHUNKING_STRATEGY:-headings}
      EVUKB_CHUNK_MAX_TOKENS: ${EVUKB_CHUNK_MAX_TOKENS:-512}
      EVUKB_CHAT_API_KEY: ${EVUKB_CHAT_API_KEY:-}
      EVUKB_CHAT_BASE_URL: ${EVUKB_CHAT_BASE_URL:-https://api.openai.com/v1}
      EVUKB_CHAT_MODEL: ${EVUKB_CHAT_MODEL:-gpt-4o-mini}
      EVUKB_RANKING_STRATEGY: ${EVUKB_RANKING_STRATEGY:-hybrid_default_v1}
      EVUKB_ENABLE_RANKING_PLUGIN_RELOAD: ${EVUKB_ENABLE_RANKING_PLUGIN_RELOAD:-false}
      EVUKB_MCP_REQUIRE_TOKEN: ${EVUKB_MCP_REQUIRE_TOKEN:-false}
      EVUKB_MCP_ENABLE_ASK: ${EVUKB_MCP_ENABLE_ASK:-false}
      EVUKB_INDEX_FRONTMATTER_SUMMARY: ${EVUKB_INDEX_FRONTMATTER_SUMMARY:-false}
      EVUKB_SYNC_SCHEDULE_CRON: ${EVUKB_SYNC_SCHEDULE_CRON:-*/5 * * * *}
    ports:
      - "${EVUKB_API_PORT:-4201}:4201"
    volumes:
      - corpus_store:/data/corpus-store

  evukb-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - evukb-api
    environment:
      TZ: ${TZ:-UTC}
      EVUKB_API_PROXY_TARGET: http://evukb-api:4201
      EVUKB_OPERATOR_API_KEY: ${EVUKB_OPERATOR_API_KEY:-}
      EVUKB_WEB_API_KEY: ${EVUKB_WEB_API_KEY:-}
      VITE_EVUKB_API_BASE_URL: ${VITE_EVUKB_API_BASE_URL:-}
      VITE_EVUKB_MCP_BASE_URL: ${VITE_EVUKB_MCP_BASE_URL:-}
      VITE_EVUKB_WORKSPACE_ID: ${VITE_EVUKB_WORKSPACE_ID:-local-dev}
    ports:
      - "${EVUKB_WEB_PORT:-4200}:4200"

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["qdrant"]
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    profiles: ["local-embed"]
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  corpus_store:
  pgdata:
  qdrant_data:
  ollama_data:
