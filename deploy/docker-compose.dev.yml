services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: evukb
      POSTGRES_PASSWORD: evukb
      POSTGRES_USER: evukb
    ports:
      # Host 5434 avoids sibling apps / local Postgres on 5432 (02m8 uses 5433).
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evukb -d evukb"]
      interval: 5s
      timeout: 5s
      retries: 10

  evukb-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    command: pnpm --filter @evu/kb-api dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CI: "true"
      TZ: ${TZ:-UTC}
      EVUKB_API_PORT: 4201
      EVUKB_BLOB_ROOT: /data/corpus-store
      EVUKB_MAX_UPLOAD_BYTES: ${EVUKB_MAX_UPLOAD_BYTES:-104857600}
      EVUKB_MAX_ARCHIVE_IMPORT_BYTES: ${EVUKB_MAX_ARCHIVE_IMPORT_BYTES:-524288000}
      EVUKB_DATABASE_URL: postgres://evukb:evukb@postgres:5432/evukb
      EVUKB_HOST: 0.0.0.0
      EVUKB_LOG_LEVEL: info
      EVUKB_VECTOR_BACKEND: pgvector
      EVUKB_EMBEDDING_PROVIDER: ${EVUKB_EMBEDDING_PROVIDER:-openai-compatible}
      EVUKB_EMBEDDING_API_KEY: ${EVUKB_EMBEDDING_API_KEY:-}
      EVUKB_EMBEDDING_BASE_URL: ${EVUKB_EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      EVUKB_EMBEDDING_MODEL: ${EVUKB_EMBEDDING_MODEL:-text-embedding-3-small}
      EVUKB_EMBEDDING_DIMENSIONS: ${EVUKB_EMBEDDING_DIMENSIONS:-1536}
      EVUKB_EMBEDDING_BATCH_SIZE: ${EVUKB_EMBEDDING_BATCH_SIZE:-8}
      EVUKB_EMBEDDING_MAX_RETRIES: ${EVUKB_EMBEDDING_MAX_RETRIES:-3}
      EVUKB_CHUNKING_STRATEGY: ${EVUKB_CHUNKING_STRATEGY:-headings}
      EVUKB_CHUNK_MAX_TOKENS: ${EVUKB_CHUNK_MAX_TOKENS:-512}
      EVUKB_CHAT_API_KEY: ${EVUKB_CHAT_API_KEY:-}
      EVUKB_CHAT_BASE_URL: ${EVUKB_CHAT_BASE_URL:-https://api.openai.com/v1}
      EVUKB_CHAT_MODEL: ${EVUKB_CHAT_MODEL:-gpt-4o-mini}
      EVUKB_SECRETS_KEY: ${EVUKB_SECRETS_KEY:-}
      EVUKB_TOKEN_PEPPER: ${EVUKB_TOKEN_PEPPER:-}
      # Dev compose opts in to open auth; production must never set this.
      EVUKB_ALLOW_OPEN_AUTH: ${EVUKB_ALLOW_OPEN_AUTH:-true}
      EVUKB_REQUIRE_API_KEY: ${EVUKB_REQUIRE_API_KEY:-false}
      EVUKB_MCP_DEV_TOKEN: ${EVUKB_MCP_DEV_TOKEN:-}
      EVUKB_MCP_REQUIRE_TOKEN: ${EVUKB_MCP_REQUIRE_TOKEN:-false}
      # Optional Qdrant: docker compose --profile qdrant up -d qdrant
      # and set EVUKB_VECTOR_BACKEND=qdrant plus EVUKB_QDRANT_URL=http://qdrant:6333
      # Optional local embeddings: docker compose --profile local-embed up -d ollama
      # then set EVUKB_EMBEDDING_* to http://ollama:11434/v1 (see deploy/local-embed.env.example)
      EVUKB_WEB_ORIGIN: http://localhost:4200
      # Example ranking strategies from examples/custom-ranking-strategy/ (dev reference).
      EVUKB_REGISTER_EXAMPLE_RANKING_STRATEGIES: ${EVUKB_REGISTER_EXAMPLE_RANKING_STRATEGIES:-true}
      EVUKB_EXAMPLE_RANKING_STRATEGIES_MODULE: /workspace/examples/custom-ranking-strategy/src/register-dev.ts
      EVUKB_ENABLE_RANKING_PLUGIN_RELOAD: ${EVUKB_ENABLE_RANKING_PLUGIN_RELOAD:-true}
    ports:
      - "4201:4201"
    volumes:
      - .:/workspace
      - corpus_store:/data/corpus-store
      - /workspace/node_modules

  evukb-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    command: pnpm --filter @evu/kb-web dev
    depends_on:
      - evukb-api
    environment:
      CI: "true"
      TZ: ${TZ:-UTC}
      VITE_EVUKB_API_PROXY_TARGET: http://evukb-api:4201
    ports:
      - "4200:4200"
    volumes:
      - .:/workspace
      - /workspace/node_modules

  qdrant:
    image: qdrant/qdrant:v1.18.2
    profiles: ["qdrant"]
    ports:
      # Host 6335 avoids evunexus Qdrant on 6333; container stays 6333.
      - "6335:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:0.9.6
    profiles: ["local-embed"]
    ports:
      # Host 11435 avoids a host Ollama on 11434; container stays 11434.
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  corpus_store:
  pgdata:
  qdrant_data:
  ollama_data:
